openapi: 3.0.3
info:
  title: Order Service API
  description: API для управления заказами (Kafka Microservices)
  version: 1.0.0

paths:
  /api/v1/orders:
    get:
      tags:
        - Orders  # <--- Это создаст файл OrdersApi.java
      summary: Get Orders list
      operationId: getOrders
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderApiModel'
    post:
      tags:
        - Orders
      summary: Create new list
      operationId: placeOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderApiModel'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: string

components:
  schemas:
    OrderApiModel:
      type: object
      required:
        - orderName
        - quantity
        - price
      properties:
        orderName:
          type: string
          example: "Order-101"
        quantity:
          type: integer
          format: int32
          example: 5
        price:
          type: number
          format: double
          example: 199.99